<!-- Initialize search module -->
<script>
layui.use('search', function() {
    layui.search.init();
});
</script>

<div class="search-view" style="padding: 15px;">
    <div class="layui-card">
        <div class="layui-card-header">
            <span style="font-size: 18px; font-weight: 600;">Search</span>
        </div>
        <div class="layui-card-body">
            <div class="layui-form layui-form-item">
                <div class="layui-inline" style="width: 60%;">
                    <input type="text" id="search-input" placeholder="Search activities, orders..." class="layui-input" style="font-size: 16px;">
                </div>
                <div class="layui-inline">
                    <select id="search-type" style="width: 120px;">
                        <option value="">All</option>
                        <option value="activity">Activities</option>
                        <option value="order">Orders</option>
                        <option value="logistics">Logistics</option>
                    </select>
                </div>
                <div class="layui-inline">
                    <button class="layui-btn" id="btn-search">Search</button>
                </div>
                <div class="layui-inline" id="btn-rebuild-wrap" style="display:none;">
                    <button class="layui-btn layui-btn-warm layui-btn-sm" id="btn-rebuild-index">Rebuild Index</button>
                </div>
            </div>
            <!-- Logistics search controls -->
            <div id="logistics-controls" style="margin: 10px 0; display: none;">
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">Sort</label>
                        <div class="layui-input-inline" style="width: 140px;">
                            <select id="logistics-sort">
                                <option value="recency">Most Recent</option>
                                <option value="relevance">Relevance</option>
                                <option value="popularity">Popularity</option>
                                <option value="tracking">Tracking #</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">Status</label>
                        <div class="layui-input-inline" style="width: 140px;">
                            <select id="logistics-status">
                                <option value="">All</option>
                                <option value="created">Created</option>
                                <option value="in_transit">In Transit</option>
                                <option value="delivered">Delivered</option>
                                <option value="exception">Exception</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">Carrier</label>
                        <div class="layui-input-inline" style="width: 140px;">
                            <input type="text" id="logistics-carrier" placeholder="Filter carrier" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm" id="btn-logistics-search">Search Logistics</button>
                    </div>
                </div>
            </div>
            <!-- Global search filter/sort controls -->
            <div id="global-search-controls" style="margin: 10px 0;">
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">Sort</label>
                        <div class="layui-input-inline" style="width: 140px;">
                            <select id="global-sort">
                                <option value="relevance">Relevance</option>
                                <option value="recency">Most Recent</option>
                                <option value="popularity">Popularity</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">Author</label>
                        <div class="layui-input-inline" style="width: 140px;">
                            <input type="text" id="global-author" placeholder="Filter by author" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">Tags</label>
                        <div class="layui-input-inline" style="width: 140px;">
                            <input type="text" id="global-tags" placeholder="Comma-separated" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">Min Replies</label>
                        <div class="layui-input-inline" style="width: 80px;">
                            <input type="number" id="global-reply-count-min" value="0" min="0" class="layui-input">
                        </div>
                    </div>
                </div>
            </div>
            <div id="search-suggestions" style="margin-bottom: 15px;"></div>
            <div class="layui-hint" id="spell-correction" style="color: #1E9FFF; cursor: pointer; display: none;"></div>
            <div id="search-results"></div>
            <div id="search-pagination"></div>
        </div>
    </div>
</div>
