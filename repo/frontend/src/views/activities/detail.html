<div class="activity-detail-view" style="padding: 15px;">
    <div class="layui-card">
        <div class="layui-card-header">
            <span style="font-size: 18px; font-weight: 600;" id="activity-title">Activity Details</span>
            <div style="float: right;">
                <button class="layui-btn layui-btn-xs" id="btn-edit">Edit</button>
                <button class="layui-btn layui-btn-xs layui-btn-normal" id="btn-versions">Versions</button>
                <button class="layui-btn layui-btn-xs layui-btn-warm" id="btn-changelog">Change Log</button>
            </div>
        </div>
        <div class="layui-card-body">
            <div class="layui-form layui-form-pane">
                <input type="hidden" name="id" id="activity-id">
                
                <blockquote class="layui-elem-quote" id="activity-state-badge"></blockquote>

                <div class="layui-tab layui-tab-brief" lay-filter="activity-tabs">
                    <ul class="layui-tab-title">
                        <li class="layui-this">Details</li>
                        <li>Signups</li>
                    </ul>
                    <div class="layui-tab-content">
                        <div class="layui-tab-item layui-show">
                            <div class="layui-form-item">
                                <label class="layui-form-label">Title</label>
                                <div class="layui-input-block">
                                    <div class="layui-form-mid" id="detail-title"></div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">Description</label>
                                <div class="layui-input-block">
                                    <div class="layui-form-mid" id="detail-body"></div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">Tags</label>
                                <div class="layui-input-block">
                                    <div id="detail-tags"></div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">Max Headcount</label>
                                <div class="layui-input-block">
                                    <div class="layui-form-mid" id="detail-max-headcount"></div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">Signup Window</label>
                                <div class="layui-input-block">
                                    <div class="layui-form-mid" id="detail-signup-window"></div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">Required Supplies</label>
                                <div class="layui-input-block">
                                    <div id="detail-supplies"></div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">Eligibility</label>
                                <div class="layui-input-block">
                                    <div id="detail-eligibility-tags"></div>
                                </div>
                            </div>
                            <hr style="border-color: #f0f0f0;">
                            <div class="layui-form-item">
                                <label class="layui-form-label">Lifecycle</label>
                                <div class="layui-input-block">
                                    <div id="detail-lifecycle-timestamps" style="line-height: 2;">
                                        <div><strong>Published:</strong> <span id="ts-published">-</span></div>
                                        <div><strong>Started:</strong> <span id="ts-started">-</span></div>
                                        <div><strong>Completed:</strong> <span id="ts-completed">-</span></div>
                                        <div><strong>Archived:</strong> <span id="ts-archived">-</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="layui-tab-item">
                            <div id="detail-signups"></div>
                        </div>
                    </div>
                </div>

                <div class="layui-form-item" id="activity-actions">
                    <button class="layui-btn layui-btn-normal" id="btn-publish">Publish</button>
                    <button class="layui-btn layui-btn-normal" id="btn-start">Start</button>
                    <button class="layui-btn layui-btn-normal" id="btn-complete">Complete</button>
                    <button class="layui-btn layui-btn-warm" id="btn-archive">Archive</button>
                    <button class="layui-btn layui-btn-primary" id="btn-signup">Sign Up</button>
                    <button class="layui-btn layui-btn-primary" id="btn-cancel-signup">Cancel Signup</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Recommendations widget -->
    <div class="layui-card" style="margin-top: 15px;">
        <div class="layui-card-header">
            <span style="font-size: 16px; font-weight: 600;">Recommended Activities</span>
        </div>
        <div class="layui-card-body" id="activity-recommendations"></div>
    </div>
</div>

<script>
layui.use('recommendations', function() {
    layui.recommendations.load('activity-recommendations', 'detail', 5);
});
</script>
