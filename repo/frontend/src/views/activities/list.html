<!-- Initialize activities module -->
<script>
layui.use('activities', function() {
    layui.activities.initList();
});
</script>

<div class="activities-list-view" style="padding: 15px;">
    <div class="layui-card">
        <div class="layui-card-header">
            <span style="font-size: 18px; font-weight: 600;">Activities</span>
            <button class="layui-btn layui-btn-normal layui-btn-sm" id="btn-add-activity" style="float: right;">
                <i class="layui-icon layui-icon-add-1"></i> Create Activity
            </button>
        </div>
        <div class="layui-card-body">
            <!-- Filters -->
            <div class="layui-form layui-form-item" lay-filter="activity-filters">
                <div class="layui-inline">
                    <label class="layui-form-label">State</label>
                    <div class="layui-input-inline">
                        <select name="state" lay-filter="filter-state" id="filter-state">
                            <option value="">All States</option>
                            <option value="draft">Draft</option>
                            <option value="published">Published</option>
                            <option value="in_progress">In Progress</option>
                            <option value="completed">Completed</option>
                            <option value="archived">Archived</option>
                        </select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">Search</label>
                    <div class="layui-input-inline">
                        <input type="text" name="keyword" placeholder="Title" class="layui-input" id="filter-keyword">
                    </div>
                </div>
                <div class="layui-inline">
                    <button class="layui-btn" id="btn-search">Search</button>
                </div>
            </div>

            <!-- Table -->
            <table class="layui-table" lay-skin="line" id="activities-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>State</th>
                        <th>Version</th>
                        <th>Signups</th>
                        <th>Max</th>
                        <th>Signup Window</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="activities-tbody">
                </tbody>
            </table>

            <!-- Pagination -->
            <div id="activities-pagination"></div>
        </div>
    </div>

    <!-- Recommendations widget -->
    <div class="layui-card" style="margin-top: 15px;">
        <div class="layui-card-header">
            <span style="font-size: 16px; font-weight: 600;">Popular Activities</span>
        </div>
        <div class="layui-card-body" id="activity-list-recommendations"></div>
    </div>
</div>

<script>
layui.use('recommendations', function() {
    layui.recommendations.loadPopular('activity-list-recommendations', 5);
});
</script>
