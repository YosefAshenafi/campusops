<!-- Initialize approvals view -->
<script>
layui.use(['jquery', 'layer', 'common'], function() {
    var $ = layui.jquery;
    var layer = layui.layer;
    var common = layui.common;

    function loadApprovals(page) {
        page = page || 1;
        common.request({
            url: '/orders?state=pending_approval&limit=20&page=' + page,
            success: function (res) {
                if (!res.success) return;
                var list = (res.data && res.data.list) || [];
                var $tbody = $('#approvals-tbody');
                $tbody.empty();
                if (list.length === 0) {
                    $tbody.append('<tr><td colspan="6" style="text-align:center;color:#999;">No pending approvals</td></tr>');
                    return;
                }
                list.forEach(function (o) {
                    $tbody.append('<tr>' +
                        '<td>' + o.id + '</td>' +
                        '<td>order</td>' +
                        '<td>' + (o.requester || o.created_by || '-') + '</td>' +
                        '<td>Order #' + o.id + ' — $' + (o.amount || 0) + '</td>' +
                        '<td><span class="layui-badge layui-bg-orange">Pending</span></td>' +
                        '<td>' +
                        '<button class="layui-btn layui-btn-xs layui-btn-normal" data-action="approve" data-id="' + o.id + '">Approve</button> ' +
                        '<button class="layui-btn layui-btn-xs layui-btn-danger" data-action="reject" data-id="' + o.id + '">Reject</button>' +
                        '</td></tr>');
                });
            }
        });
    }

    $('#approvals-tbody').on('click', '[data-action]', function () {
        var action = $(this).attr('data-action');
        var id = $(this).attr('data-id');
        var state = action === 'approve' ? 'approved' : 'rejected';
        layer.confirm(action.charAt(0).toUpperCase() + action.slice(1) + ' order #' + id + '?', { icon: 3, btn: ['OK', 'Cancel'] }, function (idx) {
            common.request({
                url: '/orders/' + id + '/approve',
                method: 'POST',
                data: { decision: action },
                success: function (res) {
                    if (res.success) {
                        layer.msg('Done', { icon: 1 });
                        loadApprovals(1);
                    }
                }
            });
            layer.close(idx);
        });
    });

    loadApprovals(1);
});
</script>

<div class="approvals-view" style="padding: 15px;">
    <div class="layui-card">
        <div class="layui-card-header">
            <span style="font-size: 18px; font-weight: 600;">Pending Approvals</span>
        </div>
        <div class="layui-card-body">
            <table class="layui-table" lay-skin="line">
                <thead>
                    <tr>
                        <th>ID</th><th>Type</th><th>Requester</th><th>Details</th><th>Status</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="approvals-tbody"></tbody>
            </table>
        </div>
    </div>
</div>
