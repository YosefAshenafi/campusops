<!-- Initialize orders module -->
<script>
layui.use('orders', function() {
    layui.orders.initList();
});
</script>

<div class="orders-list-view" style="padding: 15px;">
    <div class="layui-card">
        <div class="layui-card-header">
            <span style="font-size: 18px; font-weight: 600;">Orders</span>
            <button class="layui-btn layui-btn-normal layui-btn-sm" id="btn-add-order" style="float: right;">
                <i class="layui-icon layui-icon-add-1"></i> Create Order
            </button>
        </div>
        <div class="layui-card-body">
            <div class="layui-form layui-form-item">
                <div class="layui-inline">
                    <label class="layui-form-label">State</label>
                    <div class="layui-input-inline">
                        <select name="state" id="filter-state">
                            <option value="">All</option>
                            <option value="placed">Placed</option>
                            <option value="pending_payment">Pending Payment</option>
                            <option value="paid">Paid</option>
                            <option value="ticketing">Ticketing</option>
                            <option value="ticketed">Ticketed</option>
                            <option value="canceled">Canceled</option>
                            <option value="closed">Closed</option>
                        </select>
                    </div>
                </div>
                <div class="layui-inline">
                    <button class="layui-btn" id="btn-search">Search</button>
                </div>
            </div>
            <table class="layui-table" lay-skin="line">
                <thead>
                    <tr><th>ID</th><th>Activity</th><th>State</th><th>Amount</th><th>Ticket</th><th>Created</th><th>Actions</th></tr>
                </thead>
                <tbody id="orders-tbody"></tbody>
            </table>
            <div id="orders-pagination"></div>
        </div>
    </div>

    <!-- Recommended activities for ordering -->
    <div class="layui-card" style="margin-top: 15px;">
        <div class="layui-card-header">
            <span style="font-size: 16px; font-weight: 600;">Recommended Activities</span>
        </div>
        <div class="layui-card-body" id="order-list-recommendations"></div>
    </div>
</div>

<script>
layui.use('recommendations', function() {
    layui.recommendations.loadPopular('order-list-recommendations', 5);
});
</script>
