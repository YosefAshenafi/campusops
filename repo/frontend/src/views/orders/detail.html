<div class="order-detail-view" style="padding: 15px;">
    <div class="layui-card">
        <div class="layui-card-header">
            <span style="font-size: 18px; font-weight: 600;">Order #<span id="order-id"></span></span>
        </div>
        <div class="layui-card-body">
            <blockquote class="layui-elem-quote" id="order-state-badge"></blockquote>
            
            <div class="layui-progress layui-progress-lg" lay-showPercent="true" id="order-progress" style="margin: 20px 0;">
                <div class="layui-progress-bar" lay-percent="0%"></div>
            </div>
            
            <fieldset class="layui-elem-field">
                <legend>State History</legend>
                <div class="layui-field-box" id="order-history"></div>
            </fieldset>
            
            <div class="layui-form-item" id="order-actions" style="margin-top: 20px;"></div>
        </div>
    </div>

    <!-- Order recommendations widget -->
    <div class="layui-card" style="margin-top: 15px;">
        <div class="layui-card-header">
            <span style="font-size: 16px; font-weight: 600;">Related Orders</span>
        </div>
        <div class="layui-card-body" id="order-recommendations"></div>
    </div>
</div>

<script>
layui.use(['jquery', 'common'], function() {
    var $ = layui.jquery;
    var common = layui.common;
    common.request({
        url: '/recommendations/orders?limit=5',
        success: function (res) {
            if (res.success && res.data && res.data.length > 0) {
                var html = '';
                for (var i = 0; i < res.data.length; i++) {
                    var o = res.data[i];
                    html += '<div style="padding:5px 0;border-bottom:1px solid #eee;">' +
                        'Order #' + o.id + ' - ' + (o.state || '') +
                        (o.amount ? ' ($' + o.amount + ')' : '') + '</div>';
                }
                $('#order-recommendations').html(html);
            } else {
                $('#order-recommendations').html('<div style="color:#999;padding:10px;">No related orders</div>');
            }
        }
    });
});
</script>
