<!-- Initialize violations module -->
<script>
layui.use('violations', function() {
    layui.violations.initList();
});
</script>

<div class="violations-list-view" style="padding: 15px;">
    <div class="layui-card">
        <div class="layui-card-header">
            <span style="font-size: 18px; font-weight: 600;">Violations</span>
        </div>
        <div class="layui-card-body">
            <div class="layui-form layui-form-item">
                <div class="layui-inline">
                    <label class="layui-form-label">User</label>
                    <div class="layui-input-inline">
                        <input type="text" name="user_id" id="filter-user-id" placeholder="User ID" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <button class="layui-btn" id="btn-search">Search</button>
                </div>
            </div>
            <table class="layui-table" lay-skin="line">
                <thead><tr><th>ID</th><th>User</th><th>Rule</th><th>Points</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
                <tbody id="violations-tbody"></tbody>
            </table>
            <div id="violations-pagination"></div>
        </div>
    </div>

    <!-- Rules management (visible to admin/reviewer only, controlled by violations.js initList) -->
    <div class="layui-card" style="margin-top: 15px;" id="rules-section">
        <div class="layui-card-header">
            <span style="font-size: 18px; font-weight: 600;">Violation Rules</span>
            <button class="layui-btn layui-btn-normal layui-btn-sm" id="btn-add-rule" style="float: right;">
                <i class="layui-icon layui-icon-add-1"></i> Add Rule
            </button>
        </div>
        <div class="layui-card-body">
            <table class="layui-table" lay-skin="line">
                <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Points</th><th>Description</th><th>Actions</th></tr></thead>
                <tbody id="rules-tbody"></tbody>
            </table>
        </div>
    </div>
</div>
