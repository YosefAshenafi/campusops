<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusOps — Login</title>
    <link rel="stylesheet" href="/src/lib/layui/css/layui.css">
    <link rel="stylesheet" href="/src/assets/css/app.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <h1>CampusOps</h1>
            <p>Unified Campus Operations &amp; Logistics Management</p>
        </div>
        <form class="layui-form login-form" id="login-form">
            <div class="layui-form-item">
                <label class="layui-form-label">Username</label>
                <div class="layui-input-block">
                    <input type="text" name="username" required lay-verify="required"
                           placeholder="Enter username" autocomplete="username"
                           class="layui-input" id="input-username">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">Password</label>
                <div class="layui-input-block">
                    <input type="password" name="password" required lay-verify="required"
                           placeholder="Enter password" autocomplete="current-password"
                           class="layui-input" id="input-password">
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button class="layui-btn layui-btn-fluid layui-btn-normal" lay-submit lay-filter="login">
                        Sign In
                    </button>
                </div>
            </div>
            <div id="login-error" class="login-error" style="display:none;"></div>
            <div id="lockout-timer" class="lockout-timer" style="display:none;"></div>
        </form>
    </div>

    <script src="/src/lib/layui/layui.js"></script>
    <script src="/src/config.js"></script>
    <script>
        layui.use(['form', 'layer', 'jquery'], function () {
            var form = layui.form;
            var layer = layui.layer;
            var $ = layui.jquery;

            // If already logged in, redirect
            if (localStorage.getItem('campusops_token')) {
                window.location.href = '/index.html';
                return;
            }

            // Login form submit
            form.on('submit(login)', function (data) {
                var loadIdx = layer.load(1);

                $.ajax({
                    url: CampusOps.config.apiBase + '/auth/login',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        username: data.field.username,
                        password: data.field.password
                    }),
                    success: function (res) {
                        layer.close(loadIdx);
                        if (res.success) {
                            localStorage.setItem('campusops_token', res.data.access_token);
                            localStorage.setItem('campusops_user', JSON.stringify(res.data.user));
                            window.location.href = '/index.html';
                        } else {
                            $('#login-error').text(res.error || 'Login failed').show();
                        }
                    },
                    error: function (xhr) {
                        layer.close(loadIdx);
                        var res = xhr.responseJSON || {};
                        if (xhr.status === 429) {
                            // Account locked
                            $('#login-error').text('Account locked. Please wait.').show();
                            $('#lockout-timer').text(res.error || 'Try again in 15 minutes').show();
                        } else {
                            $('#login-error').text(res.error || 'Login failed').show();
                        }
                    }
                });

                return false;
            });
        });
    </script>
</body>
</html>
