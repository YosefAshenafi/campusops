services:
  composer:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    command: composer install --no-interaction --prefer-dist --no-progress
    networks:
      - campusops

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/var/www/frontend:ro
      - ./backend/public:/var/www/backend/public:ro
    depends_on:
      php:
        condition: service_healthy
    networks:
      - campusops
    restart: unless-stopped

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/backend
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-campusops}
      - DB_USERNAME=${DB_USERNAME:-campusops}
      - DB_PASSWORD=${DB_PASSWORD:-campusops_secret}
      - APP_KEY=${APP_KEY:-campusops_app_key_change_me}
      - APP_DEBUG=${APP_DEBUG:-true}
    depends_on:
      mysql:
        condition: service_healthy
      composer:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - campusops
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${DB_DATABASE:-campusops}
      MYSQL_USER: ${DB_USERNAME:-campusops}
      MYSQL_PASSWORD: ${DB_PASSWORD:-campusops_secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - campusops
    restart: unless-stopped

  node:
    image: node:20-alpine
    working_dir: /var/www/frontend
    volumes:
      - ./frontend:/var/www/frontend
    command: ["echo", "Node container ready for builds"]
    networks:
      - campusops

volumes:
  mysql_data:

networks:
  campusops:
    driver: bridge
